# Port to listen on (Render will provide this via PORT env var)
server.port=${PORT:8080}

# The public short URL domain (provided by Render environment setup, e.g., https://my-backend.onrender.com)
app.base-url=${APP_URL:http://localhost:8080}

# Production PostgreSQL Database Connection
# Plucks values from database environment variables standard on Render/Neon
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# Hibernate Properties for Production PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production environments
spring.h2.console.enabled=false
