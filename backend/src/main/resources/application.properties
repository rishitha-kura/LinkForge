# Default Server Configuration
server.port=8080

# Application Base Host domain URL (For generating the full shortening links)
app.base-url=http://localhost:8080

# Database Configuration (Defaults to an in-memory H2 SQL Database for easy local setup)
spring.datasource.url=jdbc:h2:mem:urlshortenerdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate JPA Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Database Console in Browser (Accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Validation properties
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
